name: Download Video (From Forked Source)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube 视频链接 (URL)'
        required: true
        type: string
      format:
        description: '下载格式 (默认: 最佳 mp4 视频 + 音频)'
        required: false
        default: 'bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库代码 (你的 fork)
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖 & JS Runtime (Deno)
        run: |
          python -m pip install --upgrade pip
          # 从当前目录安装 yt-dlp 及其依赖
          pip install .
          # 安装 ffmpeg 用于合并音视频
          sudo apt-get update && sudo apt-get install -y ffmpeg
          
          # 【关键修复 1】安装 Deno 作为 JS 运行时，解决 YouTube 签名解析问题
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: 准备 Cookie 文件
        id: prep_cookies
        env:
          # 使用环境变量传递 Secret，防止特殊字符导致 Shell 解析错误
          COOKIES_CONTENT: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$COOKIES_CONTENT" ]; then
            echo "$COOKIES_CONTENT" > cookies.txt
            echo "has_cookies=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到 YOUTUBE_COOKIES，已生成 cookies.txt"
          else
            echo "has_cookies=false" >> $GITHUB_OUTPUT
            echo "::warning::未配置 YOUTUBE_COOKIES Secret。下载极大概率会因 Bot 验证失败！"
          fi

      - name: 创建下载目录
        run: mkdir -p downloads

      - name: 执行下载 (使用本地源码)
        run: |
          COOKIE_ARG=""
          if [ "${{ steps.prep_cookies.outputs.has_cookies }}" == "true" ]; then
            COOKIE_ARG="--cookies cookies.txt"
          fi
          
          # 【关键修复 2】动态注入 Cookie 参数，避免空文件名崩溃
          python -m yt_dlp -f "${{ inputs.format }}" "${{ inputs.video_url }}" \
            -o "downloads/%(title)s.%(ext)s" \
            $COOKIE_ARG \
            --no-mtime

      - name: 检查下载的文件
        run: ls -lh downloads/ || echo "⚠️ 下载目录为空，可能下载失败"

      - name: 上传下载产物 (Artifact)
        if: always() # 即使下载失败也尝试上传（如果有的话）
        uses: actions/upload-artifact@v4
        with:
          name: youtube-downloads
          path: downloads/
          retention-days: 3
          if-no-files-found: warn # 【关键修复 3】如果没有文件只警告，不导致整个 Action 标红
