name: Download Video (From Forked Source)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube 视频链接 (URL)'
        required: true
        type: string
      format:
        description: '下载格式 (默认: 最佳 mp4 视频 + 音频)'
        required: false
        default: 'bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best'
        type: string
      branch:
        description: '要使用的分支 (留空则使用默认分支)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库代码 (你的 fork)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖项
        run: |
          python -m pip install --upgrade pip
          # 修正：从当前目录安装，会自动读取 pyproject.toml 安装所需依赖
          pip install .
          # 安装 ffmpeg，yt-dlp 依赖它来合并最佳视频和音频
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 创建下载目录
        run: mkdir -p downloads

      - name: 执行下载 (使用本地源码)
        run: |
          # 使用 python -m yt_dlp 运行你 fork 仓库中的最新源码
          python -m yt_dlp -f "${{ inputs.format }}" "${{ inputs.video_url }}" \
            -o "downloads/%(title)s.%(ext)s" \
            --cookies "${{ secrets.YOUTUBE_COOKIES }}" \
            --no-mtime

      - name: 检查下载的文件
        run: ls -lh downloads/

      - name: 上传下载产物 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: youtube-downloads
          path: downloads/
          retention-days: 3
          if-no-files-found: error
