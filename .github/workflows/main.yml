name: Download Video (From Forked Source)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube 视频链接 (URL)'
        required: true
        type: string
      format:
        description: '下载格式 (默认: 最佳 mp4 视频 + 音频)'
        required: false
        default: 'bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best'
        type: string
      branch:
        description: '要使用的分支 (留空则使用默认分支)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库代码 (你的 fork)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }} # 允许你指定运行哪个分支的代码

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖项
        run: |
          python -m pip install --upgrade pip
          # 安装 yt-dlp 源码目录下的 requirements.txt
          pip install -r requirements.txt
          # 安装 ffmpeg，yt-dlp 依赖它来合并最佳视频和音频
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 创建下载目录
        run: mkdir -p downloads

      - name: 执行下载 (使用本地源码)
        run: |
          # 注意：这里使用 `python -m yt_dlp` 而不是 `yt-dlp` 命令
          # 这样可以确保运行的是你当前 fork 仓库里的最新源码
          python -m yt_dlp -f "${{ inputs.format }}" "${{ inputs.video_url }}" \
            -o "downloads/%(title)s.%(ext)s" \
            --cookies "${{ secrets.YOUTUBE_COOKIES }}" \
            --no-mtime # 可选：不保留原始文件的修改时间，避免某些文件系统警告

      - name: 检查下载的文件
        run: ls -lh downloads/

      - name: 上传下载产物 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: youtube-downloads
          path: downloads/
          retention-days: 3 # 3天后自动清理，防止超出 GitHub 免费存储限额
          if-no-files-found: error
